name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[api,agents,dev]"

      # test_memory.py baixa um modelo ONNX na primeira execução (chromadb
      # DefaultEmbeddingFunction) — roda separado para não acoplar a saúde
      # do CI ao acesso à rede para download de modelo.
      - name: Run test suite (core)
        run: python -m pytest --ignore=tests/test_memory.py

      - name: Run memory tests (Chroma/ONNX)
        continue-on-error: true
        run: python -m pytest tests/test_memory.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build
